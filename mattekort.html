<!DOCTYPE html>

<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mattekort 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --tc: #4D96FF; --tc2: #6BCB77;
    --bg: #FFF9F0;
    --card-shadow: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle, #FFD93D33 2px, transparent 2px),
      radial-gradient(circle, #FF6B6B22 2px, transparent 2px),
      radial-gradient(circle, #6BCB7733 2px, transparent 2px);
    background-size: 60px 60px, 90px 90px, 75px 75px;
    background-position: 0 0, 30px 15px, 15px 45px;
    pointer-events: none; z-index: 0;
  }
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

/* LOGIN */
#loginScreen { justify-content: center; padding: 40px 20px; }
.login-box {
background: white; border-radius: 28px; padding: 48px 40px;
box-shadow: var(–card-shadow), 0 0 0 4px #FFD93D;
max-width: 400px; width: 100%; text-align: center;
animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.login-emoji { font-size: 64px; margin-bottom: 12px; display: block; animation: wiggle 2s ease-in-out infinite; }
.login-box h1 { font-family: ‘Fredoka One’, cursive; font-size: 2.4rem; color: #333; margin-bottom: 6px; }
.login-box p { color: #888; margin-bottom: 32px; font-size: 1rem; }
.input-group { margin-bottom: 16px; text-align: left; }
.input-group label { font-weight: 700; font-size: .85rem; color: #555; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
.input-group input {
width: 100%; padding: 14px 18px; border: 3px solid #eee; border-radius: 14px;
font-family: ‘Nunito’, sans-serif; font-size: 1rem; font-weight: 600; outline: none; transition: border-color .2s;
}
.input-group input:focus { border-color: #4D96FF; }
.btn-primary {
width: 100%; padding: 16px;
background: linear-gradient(135deg, #FF6B6B, #FF9A3C);
color: white; border: none; border-radius: 14px;
font-family: ‘Fredoka One’, cursive; font-size: 1.3rem;
cursor: pointer; transition: transform .15s, box-shadow .15s;
box-shadow: 0 6px 20px #FF6B6B55; margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px #FF6B6B66; }
.login-error { color: #FF6B6B; font-weight: 700; font-size: .9rem; margin-top: 10px; min-height: 20px; }

/* HOME */
#homeScreen { padding: 32px 20px 60px; }
.top-bar {
width: 100%; max-width: 900px;
display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;
}
.top-bar h1 { font-family: ‘Fredoka One’, cursive; font-size: 2rem; color: #333; }
.user-chip {
background: white; border-radius: 40px; padding: 8px 18px;
display: flex; align-items: center; gap: 8px;
box-shadow: 0 4px 12px rgba(0,0,0,.1); font-weight: 700; color: #555;
cursor: pointer; transition: background .2s;
}
.user-chip:hover { background: #FFD93D; }
.tables-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 16px; width: 100%; max-width: 900px;
}
.table-card {
background: white; border-radius: var(–radius); padding: 24px 16px 20px;
text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.08);
cursor: pointer; transition: transform .2s, box-shadow .2s;
position: relative; overflow: hidden; border-top: 5px solid var(–tc);
}
.table-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 32px rgba(0,0,0,.14); }
.table-num { font-family: ‘Fredoka One’, cursive; font-size: 3rem; line-height: 1; color: var(–tc); margin-bottom: 4px; }
.table-label { font-size: .8rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
.progress-bar-wrap { background: #f0f0f0; border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 8px; }
.progress-bar-fill { height: 100%; border-radius: 8px; background: var(–tc); transition: width .5s ease; }
.table-stats { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.stat-chip {
font-size: .75rem; font-weight: 800; padding: 3px 10px; border-radius: 20px;
display: flex; align-items: center; gap: 3px;
}
.stat-chip.clear { background: #E8F9ED; color: #2D9B4A; }
.stat-chip.retry { background: #FFF0E8; color: #E06B1F; }
.stat-chip.wins  { background: #EEF4FF; color: #3A6FF0; }
.completed-badge {
position: absolute; top: 10px; right: 10px; background: #FFD93D; border-radius: 50%;
width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
font-size: 14px; box-shadow: 0 2px 8px #FFD93D88; opacity: 0; transform: scale(0);
transition: all .3s cubic-bezier(.34,1.56,.64,1);
}
.table-card.has-wins .completed-badge { opacity: 1; transform: scale(1); }

/* GAME */
#gameScreen { padding: 24px 20px 60px; }
.game-header {
width: 100%; max-width: 480px; display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
}
.btn-back {
background: white; border: none; border-radius: 12px; padding: 10px 14px; font-size: 1.2rem;
cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.1); transition: transform .15s;
}
.btn-back:hover { transform: scale(1.1); }
.game-title { font-family: ‘Fredoka One’, cursive; font-size: 1.5rem; color: #333; flex: 1; }
.progress-text { font-weight: 800; font-size: .85rem; color: #aaa; }
.piles-bar { width: 100%; max-width: 480px; display: flex; gap: 12px; margin-bottom: 28px; }
.pile-box {
flex: 1; background: white; border-radius: 16px; padding: 12px 16px; text-align: center;
box-shadow: 0 3px 12px rgba(0,0,0,.07);
}
.pile-box .pile-count { font-family: ‘Fredoka One’, cursive; font-size: 1.8rem; line-height: 1; }
.pile-box .pile-label { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: #bbb; margin-top: 2px; }
.pile-box.clear-pile .pile-count { color: #2D9B4A; }
.pile-box.retry-pile .pile-count { color: #E06B1F; }
.pile-box.deck-pile  .pile-count { color: #4D96FF; }

.card-area { perspective: 1200px; margin-bottom: 28px; animation: cardIn .4s cubic-bezier(.34,1.56,.64,1); }
.flashcard {
width: 320px; height: 220px; position: relative;
transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1); cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
position: absolute; inset: 0; border-radius: 24px;
display: flex; flex-direction: column; align-items: center; justify-content: center;
backface-visibility: hidden; box-shadow: var(–card-shadow);
}
.card-front { background: white; border: 4px solid var(–tc); }
.card-back { background: var(–tc); transform: rotateY(180deg); color: white; }
.card-question { font-family: ‘Fredoka One’, cursive; font-size: 3rem; color: #333; line-height: 1.1; }
.card-hint { font-size: .85rem; color: #bbb; margin-top: 8px; font-weight: 600; }
.card-answer { font-family: ‘Fredoka One’, cursive; font-size: 4rem; }
.card-answer-label { font-size: .9rem; opacity: .7; margin-top: 4px; }
@keyframes shake {
0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
}
.flashcard.wrong { animation: shake .4s ease; }

.answer-area { width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.answer-input {
width: 100%; padding: 18px 24px; border: 3px solid #eee; border-radius: 16px;
font-family: ‘Fredoka One’, cursive; font-size: 2rem; text-align: center;
outline: none; transition: border-color .2s, transform .15s; background: white;
}
.answer-input:focus { border-color: var(–tc); transform: scale(1.02); }
.answer-input.correct { border-color: #6BCB77; background: #E8F9ED; }
.answer-input.wrong   { border-color: #FF6B6B; background: #FFEAEA; }
.action-btns { display: flex; gap: 10px; width: 100%; }
.btn-peek {
flex: 1; padding: 14px; background: white; border: 3px solid #eee; border-radius: 14px;
font-family: ‘Nunito’, sans-serif; font-weight: 800; font-size: .95rem;
cursor: pointer; color: #999; transition: all .2s;
}
.btn-peek:hover { border-color: var(–tc); color: var(–tc); }
.btn-submit {
flex: 2; padding: 14px; background: linear-gradient(135deg, var(–tc), var(–tc2));
border: none; border-radius: 14px; font-family: ‘Fredoka One’, cursive; font-size: 1.2rem;
color: white; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,.15);
transition: transform .15s, box-shadow .15s;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,.2); }

/* COMPLETE */
#completeScreen { justify-content: center; padding: 40px 20px; }
.complete-box {
background: white; border-radius: 28px; padding: 48px 40px; max-width: 420px; width: 100%;
text-align: center; box-shadow: var(–card-shadow), 0 0 0 4px var(–tc);
animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.complete-emoji { font-size: 72px; display: block; margin-bottom: 12px; animation: bounce 1s ease-in-out infinite; }
.complete-box h2 { font-family: ‘Fredoka One’, cursive; font-size: 2.2rem; color: #333; margin-bottom: 8px; }
.complete-box p { color: #888; margin-bottom: 28px; font-size: 1rem; line-height: 1.6; }
.complete-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 32px; }
.cstat { text-align: center; }
.cstat-num { font-family: ‘Fredoka One’, cursive; font-size: 2.5rem; }
.cstat-label { font-size: .75rem; font-weight: 700; color: #bbb; text-transform: uppercase; }
.cstat.c { color: #2D9B4A; } .cstat.r { color: #E06B1F; }
.complete-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-secondary {
padding: 14px; background: white; border: 3px solid #eee; border-radius: 14px;
font-family: ‘Fredoka One’, cursive; font-size: 1.1rem; cursor: pointer; color: #555; transition: all .2s;
}
.btn-secondary:hover { border-color: #ccc; background: #f8f8f8; }

/* ANIMATIONS */
@keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
@keyframes wiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
.float-feedback {
position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
font-family: ‘Fredoka One’, cursive; font-size: 2.5rem;
pointer-events: none; z-index: 999;
animation: floatUp .8s ease forwards;
}
@keyframes floatUp {
0%  { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
100%{ opacity:0; transform:translateX(-50%) translateY(-80px) scale(1.3); }
}
</style>

</head>
<body>

<!-- LOGIN -->

<div id="loginScreen" class="screen active">
  <div class="login-box">
    <span class="login-emoji">🧮</span>
    <h1>Mattekort!</h1>
    <p>Logga in eller skapa nytt konto</p>
    <div class="input-group">
      <label>Användarnamn</label>
      <input type="text" id="loginUser" placeholder="t.ex. elsa123" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Kod (4 siffror)</label>
      <input type="password" id="loginCode" placeholder="••••" maxlength="4" inputmode="numeric"
        onkeydown="if(event.key==='Enter') handleLogin()">
    </div>
    <button class="btn-primary" onclick="handleLogin()">Spela! 🚀</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- HOME -->

<div id="homeScreen" class="screen">
  <div class="top-bar">
    <h1>🧮 Välj tabell</h1>
    <div class="user-chip" onclick="logout()">
      <span id="userLabel">–</span>
      <span>👋 Logga ut</span>
    </div>
  </div>
  <div class="tables-grid" id="tablesGrid"></div>
</div>

<!-- GAME -->

<div id="gameScreen" class="screen">
  <div class="game-header">
    <button class="btn-back" onclick="goHome()">← Hem</button>
    <div class="game-title" id="gameTitle">Tabell 3</div>
    <div class="progress-text" id="progressText">0/10</div>
  </div>
  <div class="piles-bar">
    <div class="pile-box deck-pile">
      <div class="pile-count" id="deckCount">10</div>
      <div class="pile-label">🃏 Kvar</div>
    </div>
    <div class="pile-box clear-pile">
      <div class="pile-count" id="clearCount">0</div>
      <div class="pile-label">✅ Klara</div>
    </div>
    <div class="pile-box retry-pile">
      <div class="pile-count" id="retryCount">0</div>
      <div class="pile-label">🔄 Igen</div>
    </div>
  </div>
  <div class="card-area" id="cardArea">
    <div class="flashcard" id="flashcard">
      <div class="card-face card-front">
        <div class="card-question" id="cardQuestion">3 × 7</div>
        <div class="card-hint">Klicka 👀 för att kolla, eller skriv svaret</div>
      </div>
      <div class="card-face card-back">
        <div class="card-answer" id="cardAnswer">21</div>
        <div class="card-answer-label" id="cardAnswerLabel">3 × 7 = 21</div>
      </div>
    </div>
  </div>
  <div class="answer-area">
    <input type="number" id="answerInput" class="answer-input"
      placeholder="?" inputmode="numeric"
      onkeydown="if(event.key==='Enter') submitAnswer()">
    <div class="action-btns">
      <button class="btn-peek" onclick="peekCard()">👀 Kolla</button>
      <button class="btn-submit" onclick="submitAnswer()">Svara ✓</button>
    </div>
  </div>
</div>

<!-- COMPLETE -->

<div id="completeScreen" class="screen">
  <div class="complete-box">
    <span class="complete-emoji" id="completeEmoji">🎉</span>
    <h2 id="completeTitle">Rundan klar!</h2>
    <p id="completeMsg">Du tog dig igenom tabellen!</p>
    <div class="complete-stats">
      <div class="cstat c">
        <div class="cstat-num" id="cStatClear">0</div>
        <div class="cstat-label">✅ Klara</div>
      </div>
      <div class="cstat r">
        <div class="cstat-num" id="cStatRetry">0</div>
        <div class="cstat-label">🔄 Igen</div>
      </div>
    </div>
    <div class="complete-btns">
      <button class="btn-primary" id="continueBtn" onclick="continueGame()">Öva försök-igen 🔄</button>
      <button class="btn-secondary" onclick="goHome()">Tillbaka 🏠</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────
const COLORS  = ['#FF6B6B','#FF9A3C','#FFD93D','#6BCB77','#00C9A7','#4D96FF','#C77DFF','#FF6FD8','#F72585','#4CC9F0'];
const COLORS2 = ['#FF9A3C','#FFD93D','#6BCB77','#00C9A7','#4D96FF','#C77DFF','#FF6FD8','#F72585','#4CC9F0','#FF6B6B'];
const EMOJIS  = ['🦊','🐸','🦄','🐳','🦋','🚀','⭐','🌈','🍕','🎮'];

// ── DB (localStorage → swap for Firebase) ───────────
let db = {};
let currentUser = null;

function loadDB() {
  try { db = JSON.parse(localStorage.getItem('mattekort_db') || '{}'); } catch(e){ db={}; }
}
function saveDB() {
  localStorage.setItem('mattekort_db', JSON.stringify(db));
}
function getTableData(u, t) {
  if (!db[u]) db[u] = { code: '', tables: {} };
  if (!db[u].tables[t]) db[u].tables[t] = { wins: 0, clear: [], retry: [] };
  return db[u].tables[t];
}

// ── Auth ─────────────────────────────────────────────
function handleLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const code = document.getElementById('loginCode').value.trim();
  const err  = document.getElementById('loginError');
  if (!user) { err.textContent = 'Skriv ett användarnamn!'; return; }
  if (!/^\d{4}$/.test(code)) { err.textContent = 'Koden måste vara 4 siffror!'; return; }
  loadDB();
  if (!db[user]) {
    db[user] = { code, tables: {} }; saveDB();
  } else if (db[user].code !== code) {
    err.textContent = 'Fel kod! Försök igen 🔒'; return;
  }
  err.textContent = '';
  currentUser = user;
  document.getElementById('userLabel').textContent = user;
  showScreen('homeScreen');
  renderHome();
}
function logout() {
  currentUser = null;
  document.getElementById('loginUser').value = '';
  document.getElementById('loginCode').value = '';
  showScreen('loginScreen');
}

// ── Home ─────────────────────────────────────────────
function renderHome() {
  const grid = document.getElementById('tablesGrid');
  grid.innerHTML = '';
  for (let t = 1; t <= 10; t++) {
    const td    = getTableData(currentUser, t);
    const color = COLORS[t-1];
    const clearN = td.clear.length;
    const retryN = td.retry.length;
    const pct    = Math.round((clearN / 10) * 100);
    const card   = document.createElement('div');
    card.className = 'table-card' + (td.wins > 0 ? ' has-wins' : '');
    card.style.cssText = `--tc:${color}`;
    card.innerHTML = `
      <div class="completed-badge">${EMOJIS[t-1]}</div>
      <div class="table-num">${t}</div>
      <div class="table-label">Gångertabell</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="table-stats">
        <span class="stat-chip clear">✅ ${clearN}/10</span>
        ${retryN > 0 ? `<span class="stat-chip retry">🔄 ${retryN}</span>` : ''}
        ${td.wins > 0 ? `<span class="stat-chip wins">🏆 ${td.wins}×</span>` : ''}
      </div>`;
    card.onclick = () => startGame(t);
    grid.appendChild(card);
  }
}

// ── Game state ───────────────────────────────────────
let gs = { table:1, deck:[], clearPile:[], retryPile:[], current:null, peeked:false, busy:false };

function startGame(t) {
  const color  = COLORS[t-1];
  const color2 = COLORS2[t-1];
  document.documentElement.style.setProperty('--tc',  color);
  document.documentElement.style.setProperty('--tc2', color2);

  const td  = getTableData(currentUser, t);
  const all = Array.from({length:10}, (_,i) => i+1);

  // Priority: retry cards first, then uncleared
  let deck = [
    ...td.retry.map(n => ({n, fromRetry:true})),
    ...all.filter(n => !td.clear.includes(n) && !td.retry.includes(n)).map(n => ({n, fromRetry:false}))
  ];

  // If fully cleared and no retries → fresh run
  if (deck.length === 0) {
    deck = all.map(n => ({n, fromRetry:false}));
    td.clear = []; td.retry = []; saveDB();
  }

  gs = { table:t, deck, clearPile:[], retryPile:[], current:null, peeked:false, busy:false };
  document.getElementById('gameTitle').textContent = `Gångertabell ${t}`;
  showScreen('gameScreen');
  nextCard();
}

function nextCard() {
  if (gs.deck.length === 0) { endRound(); return; }

  gs.busy = false;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped','wrong');

  // Re-trigger card animation
  const area = document.getElementById('cardArea');
  area.style.animation = 'none'; void area.offsetWidth; area.style.animation = '';

  // Pick random card from deck
  gs.current = gs.deck[Math.floor(Math.random() * gs.deck.length)];
  gs.peeked  = false;

  const {table, current} = gs;
  document.getElementById('cardQuestion').textContent    = `${table} × ${current.n}`;
  document.getElementById('cardAnswer').textContent      = table * current.n;
  document.getElementById('cardAnswerLabel').textContent = `${table} × ${current.n} = ${table * current.n}`;

  const inp = document.getElementById('answerInput');
  inp.value = ''; inp.className = 'answer-input';
  setTimeout(() => inp.focus(), 50);
  updateCounts();
}

function updateCounts() {
  const {deck, clearPile, retryPile} = gs;
  document.getElementById('deckCount').textContent  = deck.length;
  document.getElementById('clearCount').textContent = clearPile.length;
  document.getElementById('retryCount').textContent = retryPile.length;
  const done = clearPile.length + retryPile.length;
  const total = deck.length + done;
  document.getElementById('progressText').textContent = `${done}/${total}`;
}

function peekCard() {
  if (gs.busy) return;
  gs.peeked = true; gs.busy = true;
  document.getElementById('flashcard').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('flashcard').classList.remove('flipped');
    moveCard(false);
  }, 1800);
}

function submitAnswer() {
  if (gs.busy || document.getElementById('flashcard').classList.contains('flipped')) return;
  const inp = document.getElementById('answerInput');
  const val = parseInt(inp.value);
  if (isNaN(val) || inp.value === '') return;
  const correct = gs.table * gs.current.n;
  if (val === correct) {
    inp.className = 'answer-input correct';
    floatFeedback('🎉 Rätt!', true);
    gs.busy = true;
    document.getElementById('flashcard').classList.add('flipped');
    setTimeout(() => { document.getElementById('flashcard').classList.remove('flipped'); moveCard(true); }, 900);
  } else {
    inp.className = 'answer-input wrong';
    const fc = document.getElementById('flashcard');
    fc.classList.add('wrong');
    floatFeedback(`✗ Det är ${correct}`, false);
    setTimeout(() => { fc.classList.remove('wrong'); inp.className='answer-input'; inp.value=''; inp.focus(); }, 600);
  }
}

function moveCard(correct) {
  const idx = gs.deck.indexOf(gs.current);
  if (idx > -1) gs.deck.splice(idx, 1);
  if (correct && !gs.peeked) { gs.clearPile.push(gs.current.n); }
  else { gs.retryPile.push(gs.current.n); }
  nextCard();
}

function floatFeedback(text, good) {
  const el = document.createElement('div');
  el.className = 'float-feedback';
  el.textContent = text;
  el.style.color = good ? '#2D9B4A' : '#E06B1F';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ── Round end ─────────────────────────────────────────
function endRound() {
  const {table, clearPile, retryPile} = gs;
  const td = getTableData(currentUser, table);

  td.clear = [...new Set([...(td.clear||[]), ...clearPile])];
  td.retry = retryPile.filter(n => !td.clear.includes(n));

  const allClear = td.clear.length === 10;
  if (allClear) { td.wins = (td.wins||0)+1; td.clear=[]; td.retry=[]; }
  saveDB();

  document.getElementById('completeEmoji').textContent = allClear ? '🏆' : (clearPile.length >= retryPile.length ? '🎉' : '💪');
  document.getElementById('completeTitle').textContent = allClear ? 'Hela tabellen klar! 🏆' : 'Rundan klar!';
  document.getElementById('completeMsg').textContent   = allClear
    ? `Fantastiskt! Du klarade hela ${table}:ans tabell. Klarat ${td.wins} gång${td.wins>1?'er':''}!`
    : `${clearPile.length} kort klarade, ${retryPile.length} att öva mer på.`;
  document.getElementById('cStatClear').textContent = clearPile.length;
  document.getElementById('cStatRetry').textContent = retryPile.length;

  const cb = document.getElementById('continueBtn');
  cb.style.display = td.retry.length > 0 ? '' : 'none';
  if (td.retry.length > 0) cb.textContent = `Öva försök-igen korten 🔄 (${td.retry.length} st)`;

  showScreen('completeScreen');
}

function continueGame() { startGame(gs.table); }
function goHome() { showScreen('homeScreen'); renderHome(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

loadDB();
</script>
